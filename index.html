<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معايدة خاصة - شيماء</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* إعدادات عامة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            /* خلفية بتدرج لوني دافئ وأنيق */
            background: linear-gradient(135deg, #2c1a12 0%, #8a7366 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* تصميم بطاقة المعايدة */
        .card {
            background: rgba(255, 255, 255, 0.98);
            width: 90%;
            max-width: 550px;
            padding: 60px 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            /* تأثير حركي عند فتح الصفحة */
            animation: fadeIn 1.8s ease-out;
            border: 3px solid #d4af37; /* إطار ذهبي */
        }

        /* حركات الأنيميشن لجعل الظهور جذاب */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تصميم الاسم "سماح" */
        .name-title {
            font-family: 'Amiri', serif;
            font-size: 4.5rem;
            color: #b8860b; /* لون ذهبي غامق */
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
        }

        /* تصميم نص التهنئة العام */
        .greeting-text {
            font-size: 1.4rem;
            color: #444;
            line-height: 1.8;
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* تصميم الأبيات الشعرية المعدلة */
        .poem {
            font-family: 'Amiri', serif;
            font-size: 1.7rem;
            color: #333;
            margin: 25px 0;
            font-style: italic;
            font-weight: 700; /* جعل الشعر أكثر وضوحاً */
            line-height: 1.6;
        }

        /* تصميم زر الصوت التفاعلي */
        .audio-btn {
            background: linear-gradient(45deg, #b8860b, #eac064);
            color: #fff;
            border: none;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-family: 'Cairo', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .audio-btn:hover {
            transform: scale(1.08); /* تكبير بسيط عند تمرير الماوس */
            box-shadow: 0 12px 25px rgba(212, 175, 55, 0.7);
        }

        .audio-btn:active {
            transform: scale(0.96); /* تأثير الضغط */
        }

        /* زخرفة علوية */
        .decoration {
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="decoration">✨ 🌷 ✨</div>
        <h1 class="name-title">شيماء</h1>
        
        <div class="greeting-text">
            <p>   كل عام وأنتِ بألف خير</p>
            
            <div class="poem">
                ما العيدُ إلّا ربيعٌ أنتِ زهرتُهُ<br>
                وأنتِ فيهِ النّسيمُ، النَّهرُ، والشَّجرةُ
            </div>
        </div>

        <button id="playBtn" class="audio-btn">
            <i class="fas fa-play"></i> تشغيل الصوت
        </button>

        <audio id="myAudio" loop>
            <source src="صوتيات/عيديه.m4a" type="audio/mpeg">
            متصفحك لا يدعم تشغيل الصوت.
        </audio>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const playBtn = document.getElementById("playBtn");
        let isPlaying = false;

        playBtn.addEventListener("click", function() {
            if (isPlaying) {
                // إيقاف الصوت
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i> تشغيل الصوت';
                isPlaying = false;
            } else {
                // تشغيل الصوت
                audio.play().then(() => {
                    playBtn.innerHTML = '<i class="fas fa-pause"></i> إيقاف الصوت';
                    isPlaying = true;
                }).catch(error => {
                    console.log("يجب تعديل رابط الصوت ليعمل.");
                    alert("الرجاء وضع رابط ملف صوتي valid في الكود.");
                });
            }
        });
    </script>

</body>
</html>
